<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热气球浮力重力平衡仿真器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f5f9ff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
            padding: 35px;
            width: 90%;
            max-width: 950px;
        }

        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .sim-area {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .balloon-container {
            flex: 2;
            height: 450px;
            border: 3px solid #4299e1;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #e8f4f8, #f0f8fb);
        }

        #balloon {
            position: absolute;
            width: 140px;
            height: 180px;
            left: calc(50% - 70px);
            bottom: 50%;
            transform: translateY(50%);
            transition: bottom 0.08s linear;
            z-index: 10;
        }

        .balloon-top {
            width: 100%;
            height: 80%;
            background: radial-gradient(circle at top center, #ffd700, #ff9800);
            border-radius: 50% 50% 45% 45%;
            position: relative;
        }

        .flame {
            position: absolute;
            bottom: -15px;
            left: calc(50% - 20px);
            width: 40px;
            height: 50px;
            background: radial-gradient(circle, #ffeb3b, #f44336);
            border-radius: 50% 50% 20% 20%;
            opacity: 0.8;
            transition: height 0.2s, opacity 0.2s;
        }

        .balloon-basket {
            width: 50px;
            height: 35px;
            background: #8d6e63;
            position: absolute;
            bottom: 0;
            left: calc(50% - 25px);
            border-radius: 6px;
            box-shadow: 0 3px 0 #6d4c41;
        }

        .height-mark {
            position: absolute;
            left: 10px;
            color: #718096;
            font-size: 12px;
        } /* 每10px间距对应1米 */

        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 18px;
            color: #2d3748;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            appearance: none;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #4299e1;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #3182ce;
        }

        .param-value {
            font-size: 19px;
            color: #4299e1;
            font-weight: 600;
            text-align: center;
            padding: 5px;
            background: #e8f4f8;
            border-radius: 6px;
        }

        .force-panel {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .force-title {
            font-size: 20px;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .force-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .force-item {
            text-align: center;
        }

        .force-label {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .force-value {
            font-size: 24px;
            font-weight: bold;
            color: #e53e3e;
        }

        .force-value.buoyancy {
            color: #48bb78;
        }

        .net-force {
            margin-top: 15px;
            text-align: center;
        }

        .net-force-value {
            font-size: 22px;
            font-weight: bold;
            color: #ed8936;
        }

        .status-text {
            text-align: center;
            margin-top: 10px;
            font-size: 17px;
            font-weight: 600;
        }

        .status-rising {
            color: #48bb78;
        }

        .status-falling {
            color: #e53e3e;
        }

        .status-stable {
            color: #4299e1;
        }

        .height-info {
            text-align: center;
            font-size: 18px;
            color: #2d3748;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>热气球浮力重力平衡仿真</h1>
        
        <div class="sim-area">
            <!-- 气球可视化区域 -->
            <div class="balloon-container" id="balloonContainer">
                <div id="balloon">
                    <div class="balloon-top">
                        <div class="flame" id="flame"></div>
                    </div>
                    <div class="balloon-basket"></div>
                </div>
                
                <!-- 高度刻度标记 -->
                <div class="height-mark" style="top: 10px;">400m</div>
                <div class="height-mark" style="top: 110px;">300m</div>
                <div class="height-mark" style="top: 210px;">200m</div>
                <div class="height-mark" style="top: 310px;">100m</div>
                <div class="height-mark" style="top: 410px;">0m</div>
            </div>

            <!-- 参数控制面板 -->
            <div class="control-panel">
                <div class="control-item">
                    <label for="weightSlider">气球重量 (kg)</label>
                    <input type="range" id="weightSlider" min="0.5" max="2" step="0.1" value="1">
                    <div class="param-value" id="weightValue">60 kg</div>
                </div>

                <div class="control-item">
                    <label for="tempSlider">内部空气温度 (°C)</label>
                    <input type="range" id="tempSlider" min="20" max="180" value="0"> <!-- 初始值会自动计算 -->
                    <div class="param-value" id="tempValue">0 °C</div>
                </div>
            </div>
        </div>

        <!-- 力值显示面板 -->
        <div class="force-panel">
            <div class="force-title">实时力值计算 (单位：牛顿 N)</div>
            <div class="force-items">
                <div class="force-item">
                    <div class="force-label">重力 (G = m×g)</div>
                    <div class="force-value" id="gravityValue">0 N</div>
                </div>
                <div class="force-item">
                    <div class="force-label">浮力 (F)</div>
                    <div class="force-value buoyancy" id="buoyancyValue">0 N</div>
                </div>
            </div>
            <div class="net-force">
                <div class="force-label">净力 (F - G)</div>
                <div class="net-force-value" id="netForceValue">0 N</div>
            </div>
            <div class="status-text" id="statusText">初始平衡：浮力 = 重力，气球悬浮</div>
        </div>

        <div class="height-info">
            当前高度：<span id="heightValue">22.5</span> m | 初始高度：22.5 m
        </div>
    </div>

    <script>
        // 1. 获取DOM元素
        const balloon = document.getElementById('balloon');
        const flame = document.getElementById('flame');
        const balloonContainer = document.getElementById('balloonContainer');
        const weightSlider = document.getElementById('weightSlider');
        const tempSlider = document.getElementById('tempSlider');
        const weightValue = document.getElementById('weightValue');
        const tempValue = document.getElementById('tempValue');
        const gravityValue = document.getElementById('gravityValue');
        const buoyancyValue = document.getElementById('buoyancyValue');
        const netForceValue = document.getElementById('netForceValue');
        const statusText = document.getElementById('statusText');
        const heightValue = document.getElementById('heightValue');

        // 2. 物理常量定义
        const PHYSICS_CONST = {
            g: 9.8,                // 重力加速度 (m/s²)
            airDensity: 1.225,     // 外部空气密度 (kg/m³)
            balloonVolume: 10,     // 气球体积 (m³)
            normalTempK: 293.15    // 20°C对应的开尔文温度
        };

        // 3. 初始参数（核心：保证初始浮力=重力）
        const params = {
            baseWeight: 1,         // 初始重量(kg)
            weight: 1,             // 当前重量
            temp: 0,               // 当前温度（初始值会自动计算）
            initHeight: 225,       // 初始高度(px)
            currentHeight: 225,    // 当前高度
            maxHeight: balloonContainer.clientHeight - 200, // 最大高度
            minHeight: 20          // 最小高度
        };

        // 4. 核心函数：计算初始平衡温度（让浮力=重力）
        function calculateEquilibriumTemp(weight) {
            // 浮力F = (ρ0 - ρ1) × V × g = 重力G = m × g
            // 推导得：ρ1 = ρ0 - m/V
            const innerAirDensity = PHYSICS_CONST.airDensity - (weight / PHYSICS_CONST.balloonVolume);
            
            // 密度与温度成反比：ρ1/ρ0 = T0/T1 → T1 = T0 × ρ0/ρ1
            const equilibriumTempK = PHYSICS_CONST.normalTempK * (PHYSICS_CONST.airDensity / innerAirDensity);
            
            // 转换为摄氏度并取整
            const equilibriumTempC = Math.round(equilibriumTempK - 273.15);
            
            // 限制温度范围（避免超出滑块范围）
            return Math.max(20, Math.min(180, equilibriumTempC));
        }

        // 5. 更新参数显示
        function updateParamDisplay() {
            // 更新重量和温度显示
            weightValue.textContent = `${params.weight} kg`;
            tempValue.textContent = `${params.temp} °C`;
            
            // 更新火焰效果（温度越高，火焰越大越亮）
            const flameRatio = (params.temp - 20) / 160;
            const flameH = 40 + flameRatio * 30;
            flame.style.height = `${flameH}px`;
            flame.style.opacity = 0.7 + flameRatio * 0.3;
        }

        // 6. 计算浮力、重力、净力
        function calculateForces() {
            // 计算重力
            const gravity = params.weight * PHYSICS_CONST.g;
            
            // 温度转换为开尔文
            const tempK = params.temp + 273.15;
            
            // 计算内部空气密度
            const innerAirDensity = PHYSICS_CONST.airDensity * (PHYSICS_CONST.normalTempK / tempK);
            
            // 计算浮力
            const buoyancy = (PHYSICS_CONST.airDensity - innerAirDensity) * PHYSICS_CONST.balloonVolume * PHYSICS_CONST.g;
            
            // 计算净力
            const netForce = buoyancy - gravity;

            return { gravity, buoyancy, netForce };
        }

        // 7. 更新力值显示和状态
        function updateForceDisplay(forces) {
            // 保留1位小数显示
            gravityValue.textContent = forces.gravity.toFixed(1) + ' N';
            buoyancyValue.textContent = forces.buoyancy.toFixed(1) + ' N';
            netForceValue.textContent = forces.netForce.toFixed(1) + ' N';
            
            // 更新状态文本和样式
            if (forces.netForce > 0.5) {
                statusText.textContent = `浮力(${forces.buoyancy.toFixed(1)}N) > 重力(${forces.gravity.toFixed(1)}N) → 气球上升`;
                statusText.className = 'status-text status-rising';
            } else if (forces.netForce < -0.5) {
                statusText.textContent = `浮力(${forces.buoyancy.toFixed(1)}N) < 重力(${forces.gravity.toFixed(1)}N) → 气球下降`;
                statusText.className = 'status-text status-falling';
            } else {
                statusText.textContent = `浮力(${forces.buoyancy.toFixed(1)}N) ≈ 重力(${forces.gravity.toFixed(1)}N) → 气球悬浮`;
                statusText.className = 'status-text status-stable';
            }
        }

        // 8. 控制气球升降
        function controlBalloonMovement(netForce) {
            // 速度与净力成正比（系数0.15控制运动速度）
            const speed = netForce * 0.15;
            
            // 更新当前高度（限制在最大/最小范围内）
            params.currentHeight = Math.max(params.minHeight, Math.min(params.maxHeight, params.currentHeight + speed));
            
            // 同步到DOM元素
            balloon.style.bottom = `${params.currentHeight}px`;
            heightValue.textContent = Math.round(params.currentHeight);
        }

        // 9. 主循环：实时计算和更新
        function mainSimulationLoop() {
            const forces = calculateForces();
            updateForceDisplay(forces);
            controlBalloonMovement(forces.netForce);
            requestAnimationFrame(mainSimulationLoop);
        }

        // 10. 绑定滑块事件
        weightSlider.addEventListener('input', function() {
            params.weight = Number(this.value);
            updateParamDisplay();
        });

        tempSlider.addEventListener('input', function() {
            params.temp = Number(this.value);
            updateParamDisplay();
        });

        // 11. 窗口大小变化时更新最大高度
        window.addEventListener('resize', function() {
            params.maxHeight = balloonContainer.clientHeight - 200;
            // 确保高度不超出新的范围
            params.currentHeight = Math.max(params.minHeight, Math.min(params.maxHeight, params.currentHeight));
        });

        // 12. 初始化（核心：计算初始平衡温度）
        function initSimulation() {
            // 计算初始平衡温度
            params.temp = calculateEquilibriumTemp(params.baseWeight);
            
            // 设置滑块初始值
            tempSlider.value = params.temp;
            
            // 更新显示
            updateParamDisplay();
            
            // 初始化气球位置
            balloon.style.bottom = `${params.initHeight}px`;
            
            // 启动仿真循环
            mainSimulationLoop();
        }

        // 启动初始化
        initSimulation();
    </script>
</body>
</html>
